
// bind config
// updated: 10/29/2024

unbindall

//              COMMUNICATION

bind 1          "say ^7 yes."
bind 2          "say ^7 no."
bind 3          "say ^7 learning things."
bind x          "say ^2:D"


//              UTILITY

bind TAB        "+scores"
bind F3         "readyup"
bind F4         "screenshotjpeg"
bind k          "kill"
bind t          "messagemode"
bind y          "messagemode2"
bind F1         "vote yes"
bind F2         "vote no"
bind 7          "dropweapon"
bind 8          "dropflag"


//              CORE MOVEMENT / ATTACK

bind e          "+forward"
bind s          "+moveleft"
bind d          "+back"
bind f          "+moveright"
bind SPACE      "+movedown"

bind SHIFT      "+speed"

bind MOUSE2     "+moveup"
bind MOUSE1     "+attack"
bind MOUSE5     "+zoom"

//              WEAPONS

bind z          "weapon 1"
bind MOUSE4     "weapon 2"
bind v          "weapon 3"
bind w          "weapon 4"
bind r          "weapon 5"
bind a          "weapon 6"
bind q          "weapon 7"
bind g          "weapon 8"
bind h          "weapon 10"
bind c          "weapon 14"
bind MOUSE3     "+button2"

bind MWHEELDOWN "weapon 3"
bind MWHEELUP   "weapon 5"

echo "-- bind config loaded."